name: 'pushover action'
description: 'Action for sending pushover notifications via pushover.net'
author: 'Usman Mahmood'
branding:
  icon: 'heart'
  color: 'blue'
inputs:
  status:
    description: "the current status of the job"
  message:
    description: "your message"
  device:
    description: 'the name of one of your devices to send just to that device instead of all devices (multiple devices may be separated by a comma)'
  priority:
    description: 'a value of -2, -1, 0 (default), 1, or 2 (https://pushover.net/api#priority)'
  sound:
    description: 'the name of a supported sound to override your default sound choice (https://pushover.net/api#sounds)'
  title:
    description: "your message's title, otherwise your app's name is used"
  ttl:
    description: 'a number of seconds that the message will live, before being deleted automatically'
  url:
    description: 'a supplementary URL to show with your message'
  url_title:
    description: 'a title for the URL specified as the url parameter, otherwise just the URL is shown'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - --status=${{ inputs.status }}
    - --message=${{ inputs.message }}
    - --device=${{ inputs.device }}
    - --priority=${{ inputs.priority }}
    - --sound=${{ inputs.sound }}
    - --title=${{ inputs.title }}
    - --ttl=${{ inputs.ttl }}
    - --url=${{ inputs.url }}
    - --url_title=${{ inputs.url_title }}
